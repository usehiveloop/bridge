name: e2e-approval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-e2e-approval:
    name: test-e2e-approval
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p bridge-e2e --test approval_e2e_a_tests --test approval_e2e_b_tests --test approval_e2e_c_tests -- --ignored --test-threads=1
