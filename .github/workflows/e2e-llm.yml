name: e2e-llm

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  real-e2e:
    name: real-e2e
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
      - name: run real llm e2e tests
        run: cargo test -p bridge-e2e --test real_e2e_a_tests --test real_e2e_b_tests --test real_e2e_c_tests --test real_e2e_d_tests --test real_e2e_e_tests --test real_e2e_f_tests --test real_e2e_g_tests --test real_e2e_h_tests --test real_e2e_i_tests --test real_e2e_j_tests --test real_e2e_k_tests --test real_e2e_l_tests -- --ignored --test-threads=1
